name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v2

      - name: Use Node.js 24.13.0
        uses: actions/setup-node@v2
        with:
          node-version: 24.13.0

      - name: Get npm cache directory path
        id: npm-cache-dir-path
        run: echo "::set-output name=dir::$(npm config get cache)"

      - uses: actions/cache@v4
        id: npm-cache
        with:
          path: ${{ steps.npm-cache-dir-path.outputs.dir }}
          key: ${{ runner.os }}-npm-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Install Dependencies
        run: npm ci

      - name: Run build
        env:
          NODE_ENV: production
          CI: "false"
        # HACK: Doing this twice is actually important.
        #
        # On the first time, ketcher-macromolecules will resolve to a
        # package-level dependency in the bundle.
        #
        # On the second time, ketcher-macromolecules gets bundled in because
        # it's been built.
        #
        # Yes, we could likely reorder the build script to build ketcher-
        # macromolecules first, but since we're working on a fork, we should be
        # conservative with modifying existing code.
        # - Tony
        run: >
          npm run build:packages &&
          npm run build:packages

      - name: Create packages
        run: >
          npm pack
          --workspace packages/ketcher-core
          --workspace packages/ketcher-react

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            *.tgz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
