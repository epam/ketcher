name: Create Autotest Request

on:
  issues:
    types: [labeled]

jobs:
  create-autotest-request:
    if: >
      github.event.label.name == 'Run TA creation workflow' &&
      (
        github.event.issue.issue_type.name == 'Feature' ||
        github.event.issue.type.name == 'Feature' ||
        github.event.issue.issue_type == 'Feature' ||
        github.event.issue.type == 'Feature'
      )
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: read
    steps:
      - name: Generate test scenarios
        id: generate-test-scenarios
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            You are a QA engineer for Ketcher, an open-source chemical structure editor (TypeScript/React).
            Generate a concise checklist of test scenarios that automated tests should cover. Include the happy path and the most important edge cases.

            Feature title: ${{ github.event.issue.title }}
            Feature description:
            ${{ github.event.issue.body || '(none)' }}

            Rules:
            - Return a JSON object with one field: "checklist".
            - "checklist" must be a markdown checklist only, with each line starting with "- [ ]".
            - Do not include headings, code fences, or prose outside the checklist.
            - Each item must be one testable scenario in plain language.
            - Be specific to Ketcher's domain (molecules, bonds, atoms, reactions, monomers) where relevant.
            - Maximum 15 items.
          claude_args: |
            --model claude-sonnet-4-20250514
            --json-schema {"type":"object","properties":{"checklist":{"type":"string"}},"required":["checklist"],"additionalProperties":false}

      - name: Create Autotest Request
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const sourceLink = issue.html_url;
            const featureTitle = issue.title;

            let structuredOutput;
            try {
              structuredOutput = JSON.parse(`${{ toJSON(steps.generate-test-scenarios.outputs.structured_output) }}`);
            } catch (error) {
              throw new Error(`Claude Code Action returned invalid structured output: ${error.message}`);
            }

            const generatedText = structuredOutput.checklist?.trim();
            if (!generatedText) {
              throw new Error('Claude Code Action did not include generated test scenarios.');
            }

            const testScenarios = generatedText
              .replace(/^```(?:markdown|md)?\s*/i, '')
              .replace(/\s*```$/, '');

            const checklistMatches = testScenarios.match(/^\s*-\s\[(?: |x|X)\]\s+.+$/gm) ?? [];
            if (checklistMatches.length === 0) {
              throw new Error('Claude Code Action did not include any markdown checklist items.');
            }

            const { data: createdIssue } = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Autotests: ${featureTitle}`,
              body: `**Source task(s):**\n- ${sourceLink}\n\n**Suggested test scenarios:**\n${testScenarios}`,
              labels: ['Autotests'],
              type: 'Task',
            });

            // Reply in the source issue with a link to the created issue.
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              body: `Autotest request created: ${createdIssue.html_url}\n\nAdd the \`Run TA creation workflow\` label to that issue when the automation checklist is ready for PR generation.`,
            });
